<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fieldset Legend Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}fieldset{padding:12px;}legend{font-weight:bold;}</style>
</head>
<body>
  <h1>Fieldset & Legend</h1>
  <fieldset>
    <legend>Login info</legend>
    <label for="user">Username</label>
    <input id="user" type="text">
    <label for="pwd">Password</label>
    <input id="pwd" type="password">
  </fieldset>
</body>
</html>
