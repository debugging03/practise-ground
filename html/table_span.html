<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Colspan Rowspan Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #000;padding:8px;text-align:left;}</style>
</head>
<body>
  <h1>Rowspan / Colspan</h1>
  <table>
    <tr>
      <th>Category</th>
      <th>Value</th>
      <th>Note</th>
    </tr>
    <tr>
      <td rowspan="2">Fruit</td>
      <td>Apple</td>
      <td>Red</td>
    </tr>
    <tr>
      <td>Banana</td>
      <td>Yellow</td>
    </tr>
    <tr>
      <td colspan="2">Total</td>
      <td>2 items</td>
    </tr>
  </table>
</body>
</html>
