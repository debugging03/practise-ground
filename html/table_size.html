<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Size Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;border:1px solid #000;width:600px;height:200px;}td,th{border:1px solid #000;padding:8px;}</style>
</head>
<body>
  <h1>Table size</h1>
  <table>
    <tr>
      <th>Product</th>
      <th>Qty</th>
    </tr>
    <tr>
      <td>Apple</td>
      <td>5</td>
    </tr>
  </table>
</body>
</html>
