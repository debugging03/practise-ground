<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Student Registration Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}label{display:block;margin:8px 0;}input,select{width:100%;padding:6px;}</style>
</head>
<body>
  <h1>Student Registration</h1>
  <label for="sname">Name</label>
  <input id="sname" type="text">
  <label for="age">Age</label>
  <input id="age" type="number" min="10" max="100">
  <label for="gender">Gender</label>
  <select id="gender">
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>
  <label for="course">Course</label>
  <input id="course" type="text">
  <div style="margin-top:8px;"><button type="button">Register</button></div>
</body>
</html>
