<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Textbox Label Button Practice</title>
  <style>body{font-family:Arial;padding:1rem;}label{display:block;margin:0.5rem 0;}input[type="text"]{padding:6px;width:300px;}</style>
</head>
<body>
  <h1>Textbox & Button</h1>
  <label for="name">Name</label>
  <input id="name" type="text" placeholder="Type your name">
  <div style="margin-top:10px;"><button type="button">Submit</button></div>
</body>
</html>
