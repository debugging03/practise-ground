<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Audio Video Image Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;line-height:1.5;}img{max-width:100%;height:auto;border:1px solid #ccc;}</style>
</head>
<body>
  <h1>Media tags</h1>
  <p>Audio:</p>
  <audio controls>
    <source src="sample-audio.mp3" type="audio/mpeg">
    Your browser does not support audio.
  </audio>
  <p>Video:</p>
  <video controls width="320" height="180">
    <source src="sample-video.mp4" type="video/mp4">
    Your browser does not support video.
  </video>
  <p>Image:</p>
  <img src="sample-image.jpg" alt="Sample image">
</body>
</html>
