<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register Login Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}label{display:block;margin:8px 0;}input{width:100%;padding:6px;}</style>
</head>
<body>
  <h1>Login</h1>
  <label for="user">Username</label>
  <input id="user" type="text">
  <label for="pass">Password</label>
  <input id="pass" type="password">
  <div style="margin-top:8px;"><button type="button">Login</button></div>
  <hr>
  <h1>Register</h1>
  <label for="newuser">New username</label>
  <input id="newuser" type="text">
  <label for="newpass">New password</label>
  <input id="newpass" type="password">
  <div style="margin-top:8px;"><button type="button">Register</button></div>
</body>
</html>
