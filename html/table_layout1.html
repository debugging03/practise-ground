<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Layout Practice 1</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #000;padding:8px;}</style>
</head>
<body>
  <h1>Page layout 1</h1>
  <table>
    <tr>
      <th colspan="2">Header</th>
    </tr>
    <tr>
      <td>Sidebar</td>
      <td>Main content</td>
    </tr>
    <tr>
      <td colspan="2">Footer</td>
    </tr>
  </table>
</body>
</html>
