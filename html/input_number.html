<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Input Number Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}label{display:block;margin:8px 0;}input{padding:6px;width:120px;}</style>
</head>
<body>
  <h1>Input type="number"</h1>
  <label for="qty">Quantity</label>
  <input id="qty" type="number" min="1" max="10" value="1">
  <p style="color:#666;font-size:0.9rem;">Use arrows or type a number.</p>
</body>
</html>
