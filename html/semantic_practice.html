<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Semantic Elements Practice</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:1.5rem;line-height:1.6;}nav a{margin-right:1rem;color:#0077cc;text-decoration:none;}article,aside,footer,header{padding:0.75rem 0;}aside{background:#f4faff;border-left:4px solid #009;}</style>
</head>
<body>
  <header>
    <h1>Header</h1>
    <p>Top section.</p>
  </header>
  <nav>
    <a href="#article">Article</a>
    <a href="#aside">Aside</a>
    <a href="#footer">Footer</a>
  </nav>
  <main>
    <article id="article">
      <h2>Article</h2>
      <p>Article block content.</p>
    </article>
    <aside id="aside">
      <p>Aside note.</p>
    </aside>
    <address>
      <p>Email: <a href="mailto:student@example.com">student@example.com</a></p>
    </address>
  </main>
  <footer id="footer">
    <p>Footer text.</p>
  </footer>
</body>
</html>
