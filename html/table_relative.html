<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Relative Size Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:80%;height:150px;border:1px solid #000;}td,th{border:1px solid #000;padding:8px;}</style>
</head>
<body>
  <h1>Relative table size</h1>
  <table>
    <tr>
      <th>Day</th>
      <th>Goal</th>
    </tr>
    <tr>
      <td>Wed</td>
      <td>Read</td>
    </tr>
  </table>
</body>
</html>
