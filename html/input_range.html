<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Input Range Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}label{display:block;margin:8px 0;}input{width:100%;}</style>
</head>
<body>
  <h1>Input type="range"</h1>
  <label for="vol">Volume</label>
  <input id="vol" type="range" min="0" max="100" value="50">
  <p style="color:#666;font-size:0.9rem;">Drag the slider to change the value.</p>
</body>
</html>
