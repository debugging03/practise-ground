<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>TH Header Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:100%;}th,td{border:1px solid #000;padding:8px;}</style>
</head>
<body>
  <h1>Table Header</h1>
  <table>
    <tr>
      <th>Name</th>
      <th>Age</th>
    </tr>
    <tr>
      <td>Aisha</td>
      <td>18</td>
    </tr>
    <tr>
      <td>Vikram</td>
      <td>19</td>
    </tr>
  </table>
</body>
</html>
