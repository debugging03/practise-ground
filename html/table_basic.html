<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #000;padding:8px;text-align:left;}</style>
</head>
<body>
  <h1>Table</h1>
  <table>
    <tr>
      <th>Item</th>
      <th>Price</th>
    </tr>
    <tr>
      <td>Pen</td>
      <td>₹10</td>
    </tr>
    <tr>
      <td>Notebook</td>
      <td>₹60</td>
    </tr>
  </table>
</body>
</html>
