<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact Form Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}label{display:block;margin:8px 0;}input,textarea{width:100%;padding:6px;}</style>
</head>
<body>
  <h1>Contact Us</h1>
  <form>
    <label for="name">Name</label>
    <input id="name" type="text">
    <label for="email">Email</label>
    <input id="email" type="email">
    <label for="msg">Message</label>
    <textarea id="msg" rows="5"></textarea>
    <div style="margin-top:8px;"><button type="button">Send</button></div>
  </form>
</body>
</html>
