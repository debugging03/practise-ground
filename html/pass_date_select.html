<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Date Select Practice</title>
  <style>body{font-family:Arial;padding:1rem;}label{display:block;margin:8px 0;}input,select{padding:6px;width:220px;}</style>
</head>
<body>
  <h1>Password / Date / Select</h1>
  <label for="pwd">Password</label>
  <input id="pwd" type="password" placeholder="password">

  <label for="bday">Birthday</label>
  <input id="bday" type="date">

  <label for="country">Country</label>
  <select id="country">
    <option>India</option>
    <option>USA</option>
    <option>UK</option>
  </select>

  <div style="margin-top:10px;"><button type="button">Submit</button></div>
</body>
</html>
