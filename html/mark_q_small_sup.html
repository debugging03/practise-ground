<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mark, Q, Small, Sup Practice</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:1.5rem;line-height:1.6;}code{background:#f4f4f4;padding:2px 5px;border-radius:4px;}</style>
</head>
<body>
  <h1>Practice mark / q / small / sup</h1>
  <p>Highlight: <mark>mark</mark></p>
  <p>Quote: <q cite="https://example.com">this is a quote</q></p>
  <p>Small text: <small>note</small></p>
  <p>Superscript: E=mc<sup>2</sup></p>
</body>
</html>
