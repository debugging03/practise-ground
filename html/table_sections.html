<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Table Sections Practice</title>
  <style>body{font-family:Arial,sans-serif;padding:1rem;}table{border-collapse:collapse;width:100%;}td,th{border:1px solid #000;padding:8px;text-align:left;}caption{font-weight:bold;margin-bottom:8px;}</style>
</head>
<body>
  <h1>Table sections</h1>
  <table>
    <caption>Monthly plan</caption>
    <thead>
      <tr>
        <th>Day</th>
        <th>Task</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Mon</td>
        <td>Study</td>
      </tr>
      <tr>
        <td>Tue</td>
        <td>Practice</td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="2">End of week</td>
      </tr>
    </tfoot>
  </table>
</body>
</html>
