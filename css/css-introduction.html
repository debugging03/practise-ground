<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Introduction</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #fff;
      color: #222;
    }
    .card {
      max-width: 500px;
      margin: 0 auto;
      border: 1px solid #ccc;
      padding: 18px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .highlight {
      color: #005;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>What is CSS?</h1>
    <p>CSS means Cascading Style Sheets. It changes how HTML looks on the screen.</p>
    <p class="highlight">It can set colors, fonts, spacing, and layout.</p>
  </div>
</body>
</html>
