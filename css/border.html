<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Border</title>
  <style>
    .border-sample {
      border: 4px solid #246;
      padding: 12px;
      margin-bottom: 12px;
    }
    .shorthand {
      border: 2px dashed #d33;
      padding: 12px;
    }
  </style>
</head>
<body>
  <h1>CSS Border</h1>
  <div class="border-sample">This uses full longhand border values.</div>
  <div class="shorthand">This uses shorthand border property.</div>
</body>
</html>
