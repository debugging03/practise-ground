<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Margin</title>
  <style>
    .outer {
      border: 1px solid #99a;
      margin: 16px;
      padding: 10px;
    }
    .inner {
      background: #eef;
      margin: 20px 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>CSS Margin</h1>
  <div class="outer">
    Outer box margin around the element.
    <div class="inner">Inner box with margin outside it.</div>
  </div>
</body>
</html>
