<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Structural Selectors</title>
  <style>
    ul li:first-child {
      color: #116;
    }
    ul li:last-child {
      color: #611;
    }
    ul li:empty {
      color: #999;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Structural Selectors</h1>
  <ul>
    <li>First item</li>
    <li>Middle item</li>
    <li></li>
    <li>Last item</li>
  </ul>
</body>
</html>
