<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>General Sibling Selector</title>
  <style>
    h2 ~ p {
      color: #d23;
    }
  </style>
</head>
<body>
  <h1>General sibling selector</h1>
  <h2>Title</h2>
  <p>All paragraphs after this heading are styled by <code>h2 ~ p</code>.</p>
  <p>This paragraph is also a general sibling of the H2.</p>
</body>
</html>
