<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Media Queries</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f3f7ff;
    }
    .box {
      background: #fff;
      border: 1px solid #c5d;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .responsive {
      background: #def;
      padding: 12px;
      margin-top: 12px;
    }
    @media (max-width: 600px) {
      .box {
        padding: 14px;
      }
      .responsive {
        background: #fdd;
      }
    }
  </style>
</head>
<body>
  <h1>Media Queries</h1>
  <div class="box">
    Resize the browser to see the style change when the screen is 600px or smaller.
    <div class="responsive">This color changes on small screens.</div>
  </div>
</body>
</html>
