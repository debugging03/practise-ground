<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Overflow and Scrollbar</title>
  <style>
    .box {
      width: 260px;
      height: 120px;
      border: 1px solid #669;
      overflow: auto;
      padding: 10px;
      background: #f6f8ff;
    }
    .content {
      width: 500px;
      height: 180px;
      background: #eef;
    }
  </style>
</head>
<body>
  <h1>Overflow and Scrollbar</h1>
  <div class="box">
    <div class="content">This content is larger than the box, so a scrollbar appears.</div>
  </div>
</body>
</html>
