<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Styling</title>
  <style>
    .title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 2rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .subtitle {
      font-style: italic;
      color: #555;
    }
  </style>
</head>
<body>
  <h1 class="title">Text Styling</h1>
  <p class="subtitle">Use font family, size, style, and spacing to make text better.</p>
</body>
</html>
