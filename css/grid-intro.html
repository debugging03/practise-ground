<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Intro</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px;
      background: #f4f6ff;
    }
    .item {
      background: #dde;
      padding: 16px;
      border: 1px solid #aac;
    }
  </style>
</head>
<body>
  <h1>CSS Grid Basics</h1>
  <div class="grid">
    <div class="item">Grid item 1</div>
    <div class="item">Grid item 2</div>
    <div class="item">Grid item 3</div>
    <div class="item">Grid item 4</div>
  </div>
</body>
</html>
