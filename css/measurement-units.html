<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Measurement Units</title>
  <style>
    .px {
      font-size: 16px;
      color: #222;
    }
    .em {
      font-size: 1.2em;
      color: #135;
    }
    .rem {
      font-size: 1.1rem;
      color: #351;
    }
    .vh {
      height: 20vh;
      background: #eef;
      padding: 12px;
      margin-bottom: 10px;
    }
    .vw {
      width: 50vw;
      background: #f9f1e7;
      padding: 12px;
    }
  </style>
</head>
<body>
  <h1>CSS Measurement Units</h1>
  <p class="px">16px text</p>
  <p class="em">1.2em text</p>
  <p class="rem">1.1rem text</p>
  <div class="vh">This box is 20vh tall.</div>
  <div class="vw">This box is 50vw wide.</div>
</body>
</html>
