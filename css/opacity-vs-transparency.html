<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transparency vs Opacity</title>
  <style>
    .opacity-box {
      background: rgba(100, 150, 220, 0.5);
      padding: 14px;
      margin-bottom: 10px;
    }
    .transparent-box {
      background: transparent;
      border: 1px solid #4a7;
      padding: 14px;
    }
  </style>
</head>
<body>
  <h1>Opacity vs Transparency</h1>
  <div class="opacity-box">This box uses <code>opacity</code> on the background color.</div>
  <div class="transparent-box">This box uses <code>transparent</code> as the background.</div>
</body>
</html>
