<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pseudo Elements</title>
  <style>
    p::first-line {
      font-size: 1.2rem;
      font-weight: bold;
    }
    p::first-letter {
      font-size: 2rem;
      color: #3a5;
    }
    p::selection {
      background: #fea;
      color: #321;
    }
  </style>
</head>
<body>
  <h1>Pseudo Elements</h1>
  <p>Select this text and see the selection style, or read the first line and first letter styling.</p>
</body>
</html>
