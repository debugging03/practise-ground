<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Display Property</title>
  <style>
    .inline-box {
      display: inline;
      background: #ffebcd;
      padding: 6px;
      margin-right: 6px;
    }
    .block-box {
      display: block;
      background: #dfe7ff;
      padding: 10px;
      margin-bottom: 10px;
    }
    .flex-box {
      display: flex;
      gap: 10px;
      background: #eefaf0;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Display Property</h1>
  <span class="inline-box">Inline</span>
  <span class="inline-box">Inline</span>
  <div class="block-box">Block element takes full width.</div>
  <div class="flex-box">
    <div>Flex item 1</div>
    <div>Flex item 2</div>
  </div>
</body>
</html>
