<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Background Position</title>
  <style>
    .box {
      width: 300px;
      height: 200px;
      background-image: url('https://via.placeholder.com/400');
      background-size: cover;
      background-position: right top;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <h1>Background Position</h1>
  <div class="box">This uses <code>background-position: right top;</code></div>
</body>
</html>
