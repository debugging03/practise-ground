<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grid Align Self</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
      background: #f4ffef;
      height: 220px;
    }
    .box {
      background: #e8f8e2;
      padding: 18px;
      border: 1px solid #7a8;
    }
    .top { align-self: start; }
    .middle { align-self: center; }
    .bottom { align-self: end; }
  </style>
</head>
<body>
  <h1>align-self</h1>
  <div class="grid">
    <div class="box top">Top</div>
    <div class="box middle">Center</div>
    <div class="box bottom">End</div>
  </div>
</body>
</html>
