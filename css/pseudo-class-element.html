<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pseudo Class vs Element</title>
  <style>
    a:hover {
      color: #c03;
    }
    p::first-letter {
      font-size: 2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Pseudo Class and Pseudo Element</h1>
  <p>Hover this <a href="#">link</a> to see a pseudo class. This paragraph uses <code>::first-letter</code> to style only the first letter.</p>
</body>
</html>
