<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DOM and CSSOM</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
      background: #f0f4f9;
    }
    .box {
      border: 1px solid #aac;
      background: white;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 8px;
    }
    .label {
      font-weight: bold;
      color: #334;
    }
  </style>
</head>
<body>
  <h1>DOM vs CSSOM</h1>
  <div class="box">
    <span class="label">DOM:</span> A tree of HTML elements the browser builds from page markup.
  </div>
  <div class="box">
    <span class="label">CSSOM:</span> A tree of CSS rules the browser builds from style sheets.
  </div>
  <div class="box">
    Together they make the final page style and layout.
  </div>
</body>
</html>
