<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Transition</title>
  <style>
    .box {
      width: 120px;
      height: 120px;
      background: #cde;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 12px;
      border: 1px solid #8ab;
      transition: background 0.4s ease, transform 0.4s ease;
    }
    .box:hover {
      background: #6a9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>CSS Transition</h1>
  <div class="box">Hover me</div>
</body>
</html>
