<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Family</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .serif {
      font-family: Georgia, 'Times New Roman', serif;
    }
    .sans {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <h1>Font Family Examples</h1>
  <p class="serif">This paragraph uses a serif font stack.</p>
  <p class="sans">This paragraph uses a sans-serif font stack.</p>
</body>
</html>
