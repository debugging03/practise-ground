<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Box Model</title>
  <style>
    .box {
      width: 220px;
      padding: 16px;
      border: 2px solid #2b7;
      margin: 18px;
      background: #fff;
    }
    .example {
      background: #f0f8ff;
      padding: 12px;
      border: 1px dashed #aac;
    }
  </style>
</head>
<body>
  <h1>CSS Box Model</h1>
  <div class="box">
    Content area 220px wide<br>
    Padding adds space inside<br>
    Border surrounds the box<br>
    Margin adds space outside
  </div>
  <div class="example">This example shows how all parts fit together.</div>
</body>
</html>
