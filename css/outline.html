<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Outline</title>
  <style>
    .outline-box {
      padding: 14px;
      border: 1px solid #bbb;
      outline: 3px solid #4a0;
      outline-offset: 4px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>CSS Outline</h1>
  <div class="outline-box">This box has an outline around it that does not affect layout.</div>
</body>
</html>
