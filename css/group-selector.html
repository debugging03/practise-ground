<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Group Selector</title>
  <style>
    h1, h2, p {
      color: #1b3;
    }
    p {
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Group Selector Example</h1>
  <h2>Same color on headings</h2>
  <p>This paragraph uses the same rule as the headings because of <code>h1, h2, p</code>.</p>
</body>
</html>
