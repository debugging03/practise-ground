<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Inline, Internal, External</title>
  <link rel="stylesheet" href="external-styles.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #fafbff;
    }
    .internal-box {
      background: #eef;
      padding: 15px;
      border: 1px solid #99c;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>CSS Inline, Internal, External</h1>
  <p style="color: #c22; font-weight: bold;">
    This is inline style.
  </p>
  <div class="internal-box">
    This is internal style in the page.
  </div>
  <div class="external-box">
    This is external style from a linked stylesheet.
  </div>
</body>
</html>
