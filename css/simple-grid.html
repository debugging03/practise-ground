<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple CSS Grid</title>
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 12px;
    }
    .box {
      background: #f0f8ff;
      padding: 18px;
      border: 1px solid #8aa;
    }
  </style>
</head>
<body>
  <h1>Simple Grid Example</h1>
  <div class="grid">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
  </div>
</body>
</html>
