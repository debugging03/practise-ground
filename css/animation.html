<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Animation</title>
  <style>
    .box {
      width: 140px;
      height: 140px;
      background: #acb;
      margin: 16px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      animation: float 2.4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
    }
  </style>
</head>
<body>
  <h1>CSS Animation</h1>
  <div class="box">Float</div>
</body>
</html>
