<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Shadow</title>
  <style>
    .shadow-text {
      font-size: 2rem;
      color: #222;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .soft-shadow {
      font-size: 1.2rem;
      color: #4a2;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <h1 class="shadow-text">Text Shadow Example</h1>
  <p class="soft-shadow">This text uses a softer shadow for a subtle effect.</p>
</body>
</html>
