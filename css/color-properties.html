<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Properties</title>
  <style>
    .rgb {
      color: rgb(220, 20, 60);
    }
    .hex {
      color: #1e90ff;
    }
    .hsl {
      color: hsl(120, 60%, 35%);
    }
  </style>
</head>
<body>
  <h1>CSS Color Examples</h1>
  <p class="rgb">RGB color: rgb(220, 20, 60)</p>
  <p class="hex">HEX color: #1e90ff</p>
  <p class="hsl">HSL color: hsl(120, 60%, 35%)</p>
</body>
</html>
