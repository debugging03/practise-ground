<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Padding</title>
  <style>
    .box {
      background: #f3f5ff;
      border: 1px solid #a6b;
      padding: 20px 10px 12px 30px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
  <h1>CSS Padding</h1>
  <div class="box">Top padding 20px, right 10px, bottom 12px, left 30px.</div>
</body>
</html>
