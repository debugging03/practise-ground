<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Border Radius</title>
  <style>
    .box {
      width: 180px;
      padding: 18px;
      background: #e2f5ff;
      border-radius: 20px;
      border: 1px solid #7ab;
      margin-bottom: 14px;
    }
    .circle {
      width: 100px;
      height: 100px;
      background: #fed;
      border-radius: 50%;
      display: inline-block;
      line-height: 100px;
      text-align: center;
      border: 1px solid #c85;
    }
  </style>
</head>
<body>
  <h1>Border Radius</h1>
  <div class="box">Rounded corner box with <code>border-radius</code>.</div>
  <div class="circle">Circle</div>
</body>
</html>
