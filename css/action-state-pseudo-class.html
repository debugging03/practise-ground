<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Action State Pseudo Class</title>
  <style>
    button:hover {
      background: #286;
      color: white;
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <h1>Action/State Pseudo Class</h1>
  <button>Hover or click me</button>
</body>
</html>
