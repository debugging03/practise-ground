<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Flexbox Basics</title>
  <style>
    .container {
      display: flex;
      gap: 10px;
      background: #f4f4ff;
      padding: 12px;
      border: 1px solid #aac;
    }
    .item {
      background: #dde;
      padding: 14px;
      border: 1px solid #99c;
      flex: 1;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Flexbox Basics</h1>
  <div class="container">
    <div class="item">Item 1</div>
    <div class="item">Item 2</div>
    <div class="item">Item 3</div>
  </div>
</body>
</html>
