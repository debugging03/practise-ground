<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Benefits of CSS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7ff;
      color: #222;
      padding: 24px;
    }
    .benefit {
      background: white;
      border: 1px solid #d0d7e8;
      border-left: 4px solid #4a7;
      padding: 14px;
      margin-bottom: 14px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h1>Benefits of CSS</h1>
  <div class="benefit">
    <strong>1. Clean layout:</strong> CSS separates style from HTML so the page structure stays simple.
  </div>
  <div class="benefit">
    <strong>2. Reuse styles:</strong> One rule can style many elements, so the code is smaller and faster.
  </div>
  <div class="benefit">
    <strong>3. Better maintenance:</strong> Changing one CSS rule updates many pages.
  </div>
</body>
</html>
